services:
  db:
    image: mysql:8.2
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mini_stok_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  app:
    build: .
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ""
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: mini_stok_db
      DB_USERNAME: root
      DB_PASSWORD: root
      SESSION_DRIVER: file
      CACHE_STORE: file
      LOG_CHANNEL: stderr

volumes:
  db_data:
